name: offline-sync-bench-syncular

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - syncular-bench-pgdata:/var/lib/postgresql/data

  syncular:
    build:
      context: ../../
      dockerfile: stacks/syncular/Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench
      PORT: "3000"
      PUBLIC_SYNC_BASE_URL: http://localhost:3210/api/sync
      BLOB_TOKEN_SECRET: syncular-bench-blob-secret
      SYNCULAR_BENCH_SNAPSHOT_BUNDLE_MAX_BYTES: "${SYNCULAR_BENCH_SNAPSHOT_BUNDLE_MAX_BYTES-}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3210:3000"

  admin:
    build:
      context: ../../
      dockerfile: services/bench-admin/Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench
      PORT: "3000"
      STACK_ID: syncular
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3211:3000"

volumes:
  syncular-bench-pgdata:
