name: offline-sync-bench-replicache

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "55437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - replicache-bench-pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ../../
      dockerfile: services/replicache-bench-app/Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3220:3000"

  admin:
    build:
      context: ../../
      dockerfile: services/bench-admin/Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench
      PORT: "3000"
      STACK_ID: replicache
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3221:3000"

volumes:
  replicache-bench-pgdata:
