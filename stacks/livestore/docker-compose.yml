name: offline-sync-bench-livestore

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "55438:5432"
    volumes:
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
      - livestore-bench-pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 5s
      timeout: 3s
      retries: 10

  electric:
    image: electricsql/electric:canary
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench?sslmode=disable
      ELECTRIC_INSECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3222:3000"

  app:
    build:
      context: ../../
      dockerfile: services/livestore-bench-app/Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@postgres:5432/bench
      PORT: "3000"
      STACK_ID: livestore
      ELECTRIC_URL: http://electric:3000
      LIVESTORE_STORE_ID: benchmark
    depends_on:
      postgres:
        condition: service_healthy
      electric:
        condition: service_started
    ports:
      - "3223:3000"

volumes:
  livestore-bench-pgdata:
